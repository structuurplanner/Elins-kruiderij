<head>

<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d2318;--bg2:#1e3a2e;--gold:#c9a96e;--gold2:#8B6914;
    --gold-dim:#6b5a3a;--text:#e8d9b5;--text-dim:#9a8a6a;
    --purple:#9a7ab0;--green:#7aaa5a;--red:#e87a7a;
    --card:rgba(255,255,255,0.04);--border:rgba(180,130,60,0.15);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',Georgia,serif;min-height:100vh;max-width:480px;margin:0 auto;position:relative}
  body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");opacity:0.5}

  #header{padding:20px 20px 0;position:relative;z-index:1}
  .header-top{display:flex;align-items:flex-start;justify-content:space-between}
  .app-label{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--gold-dim);margin-bottom:2px}
  .app-title{font-family:'IM Fell English',serif;font-size:28px;color:var(--gold);text-shadow:0 0 30px rgba(180,130,60,0.3);line-height:1.1}
  #cloud-status{font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:8px;margin-top:6px;white-space:nowrap;background:rgba(80,140,80,0.15);color:var(--green);border:1px solid rgba(122,170,90,0.3)}

  #nav{display:flex;gap:6px;padding:14px 20px 0;position:relative;z-index:1;flex-wrap:wrap}
  .nav-btn{padding:6px 13px;border-radius:20px;font-size:11px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:1px solid #3a2e1a;background:rgba(255,255,255,0.03);color:var(--gold-dim);font-family:'Crimson Pro',serif;transition:all 0.2s}
  .nav-btn.active{border-color:var(--gold);background:rgba(180,130,60,0.18);color:var(--gold)}

  #content{padding:20px;position:relative;z-index:1}

  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;cursor:pointer;transition:all 0.2s}
  .card:hover{background:rgba(255,255,255,0.07);border-color:rgba(180,130,60,0.3)}
  .card.inactive{opacity:0.45;filter:grayscale(0.5)}
  .card-name{font-size:18px;color:#d4b483;margin-bottom:5px;font-family:'IM Fell English',serif}
  .card-snippet{font-size:13px;color:var(--text-dim);margin-top:6px;line-height:1.5}

  /* Toggle */
  .toggle{position:relative;width:38px;height:20px;flex-shrink:0;display:inline-block}
  .toggle input{opacity:0;width:0;height:0}
  .toggle-slider{position:absolute;inset:0;background:#2a1e0a;border-radius:20px;cursor:pointer;transition:0.3s;border:1px solid #3a2e1a}
  .toggle-slider:before{content:'';position:absolute;height:14px;width:14px;left:2px;top:2px;background:#6b5a3a;border-radius:50%;transition:0.3s}
  .toggle input:checked+.toggle-slider{background:rgba(180,130,60,0.25);border-color:var(--gold)}
  .toggle input:checked+.toggle-slider:before{transform:translateX(18px);background:var(--gold)}
  .toggle-row{display:flex;align-items:center;gap:8px;margin-top:10px}
  .toggle-lbl{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--gold-dim)}
  .toggle-lbl.on{color:var(--green)}

  .badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;letter-spacing:1px;text-transform:uppercase;margin-right:5px}
  .badge-self{background:rgba(85,107,63,0.2);color:#7aaa5a;border:1px solid rgba(85,107,63,0.3)}
  .badge-off{background:rgba(80,60,40,0.3);color:#6b5a3a;border:1px solid #3a2e1a}

  .section-title{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold-dim);margin-bottom:10px;border-bottom:1px solid #2a1e0a;padding-bottom:6px}

  .tag{display:inline-block;margin:3px;padding:5px 10px;border-radius:14px;font-size:12px;cursor:pointer;transition:all 0.15s;background:rgba(255,255,255,0.04);border:1px solid #2a1e0a;color:#7a6a4a}
  .tag.active{background:rgba(180,130,60,0.25);border-color:var(--gold);color:var(--gold)}
  .tag.spiritual{border-color:#3a2a4a;color:var(--purple)}
  .tag.no-click{cursor:default}

  input,textarea,select{width:100%;background:rgba(255,255,255,0.05);border:1px solid #3a2e1a;border-radius:8px;color:var(--text);padding:10px 12px;font-size:14px;font-family:'Crimson Pro',serif;outline:none;resize:vertical}
  select{cursor:pointer}
  .form-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#8B7355;margin-bottom:4px;display:block}
  .form-row{margin-bottom:14px}
  .input-wrap{position:relative}
  .mic-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:rgba(180,130,60,0.15);border:1px solid rgba(180,130,60,0.3);border-radius:50%;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all 0.2s}

  input.with-mic{padding-right:44px}
  .textarea-wrap{position:relative}
  .textarea-wrap .mic-btn{top:10px;transform:none}

  .btn{padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-size:13px;letter-spacing:1px;text-transform:uppercase;font-family:'Crimson Pro',serif;transition:all 0.2s}
  .btn-primary{background:linear-gradient(135deg,var(--gold2),var(--gold));color:var(--bg);font-weight:600}
  .btn-secondary{background:rgba(255,255,255,0.06);color:var(--gold);border:1px solid #3a2e1a}
  .btn-danger{background:rgba(139,50,50,0.3);color:var(--red)}

  .btn-row{display:flex;gap:8px;margin-top:16px}

  .back-btn{background:none;border:none;color:#8B7355;cursor:pointer;font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:0 0 16px;display:flex;align-items:center;gap:6px;font-family:'Crimson Pro',serif}

  .ai-box{background:rgba(90,60,20,0.15);border:1px solid rgba(180,130,60,0.2);border-radius:12px;padding:16px;margin-top:16px}
  .ai-text{font-size:14px;line-height:1.9;color:#d4b483;white-space:pre-wrap}

  .combo-box{background:rgba(60,40,90,0.2);border:1px solid rgba(154,122,176,0.3);border-radius:12px;padding:16px;margin-top:12px}
  .combo-title{font-family:'IM Fell English',serif;font-size:18px;color:var(--purple);margin-bottom:10px}
  .combo-middelen{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0 12px}
  .combo-chip{padding:6px 14px;border-radius:10px;font-size:13px;background:rgba(154,122,176,0.15);border:1px solid rgba(154,122,176,0.35);color:var(--purple)}
  .combo-chip.off{background:rgba(80,60,60,0.15);border-color:#3a2e1a;color:#6b5a3a;text-decoration:line-through}
  .combo-uitleg{font-size:14px;color:var(--text-dim);line-height:1.8}
  .combo-voorzorg{font-size:12px;color:#e8a87a;margin-top:10px;padding-top:10px;border-top:1px solid rgba(180,130,60,0.12)}

  .detail-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold-dim);margin-bottom:4px}
  .detail-value{font-size:15px;color:var(--gold);line-height:1.6}
  .detail-section{margin-bottom:18px}
  .detail-notes{background:rgba(180,130,60,0.07);border-radius:8px;padding:10px 12px;font-style:italic}
  .detail-caution{color:#e8a87a}

  .home-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
  .home-tile{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px 10px;cursor:pointer;text-align:center;transition:all 0.2s;font-family:'Crimson Pro',serif}

  .home-tile-icon{font-size:26px;margin-bottom:6px}
  .home-tile-label{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#8B7355}

  .voorraad-row{display:flex;gap:14px;justify-content:center;margin-top:8px;font-size:12px;color:var(--text-dim)}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
  .dot-on{background:var(--green)}
  .dot-off{background:#3a2e1a}
  .save-msg{color:var(--green);font-size:13px;margin-top:8px}

  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  @keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .fadein{animation:fadein 0.3s ease}
</style>
</head>

// SPRAAK
function makeSpeechRec(onResult,onEnd){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return null;
  const rec=new SR();rec.lang="nl-NL";rec.continuous=true;rec.interimResults=true;
  let final="";
  rec.onstart=()=>{final="";};rec.onend=onEnd;rec.onerror=onEnd;
  rec.onresult=(e)=>{
    let interim="";
    for(let i=e.resultIndex;i<e.results.length;i++){
      const t=e.results[i][0].transcript;
      if(e.results[i].isFinal)final+=t+" ";else interim=t;
    }
    onResult(final+interim);
  };
  return rec;
}
function toggleAiMic(){
  if(aiListening){aiRec&&aiRec.stop();aiListening=false;}
  else{
    aiRec=makeSpeechRec(
      t=>{aiQuery=t;const el=document.getElementById("ai-input");if(el)el.value=t;},
      ()=>{aiListening=false;updateMic("ai-mic","ai-mic-label",false);}
    );
    if(aiRec){aiRec.start();aiListening=true;}
  }
  updateMic("ai-mic","ai-mic-label",aiListening);
}
function toggleDirectMic(){
  if(directListening){directRec&&directRec.stop();directListening=false;}
  else{
    directRec=makeSpeechRec(

      ()=>{directListening=false;updateMic("direct-mic","direct-mic-label",false);}
    );
    if(directRec){directRec.start();directListening=true;}
  }
  updateMic("direct-mic","direct-mic-label",directListening);
}
function updateMic(bid,lid,on){
  const b=document.getElementById(bid);if(b){b.textContent=on?"⏹":"🎙";b.className="mic-btn"+(on?" listening":"");}
  const l=document.getElementById(lid);if(l)l.style.display=on?"block":"none";
}

// AI
async function askAI(){
  const inp=document.getElementById("ai-input");
  aiQuery=inp?inp.value:aiQuery;
  if(!aiQuery.trim())return;
  let apiKey=getApiKey();
  if(!apiKey){
    const k=prompt("Voer je Anthropic API key in (begint met sk-ant-):");
    if(!k||!k.startsWith('sk-')){alert("Geen geldige key ingevoerd.");return;}
    saveApiKey(k);
    apiKey=k;
  }
  aiResponse=null;comboResponse=null;
  const btn=document.getElementById("ask-btn");
  if(btn){btn.textContent="Zoeken...";btn.disabled=true;}

  const lijst=remedies.map(r=>`[${r.active?"BESCHIKBAAR":"UITGESCHAKELD"}] ${r.name} (${typeLabels[r.type]}): symptomen: ${r.symptoms.join(", ")}; spiritueel: ${r.spiritual.join(", ")}; ${r.description}`).join("\n");

  const conversatieHistorie = aiGesprek.map(m => ({role: m.role, content: m.content}));
  const nieuwBericht = `Vraag: "${aiQuery}"

Geef advies in drie lagen (gebruik alleen BESCHIKBARE middelen uit de apotheek):

FYSIEK: [max 2-3 middelen met dosering]
EMOTIONEEL/MENTAAL: [max 2 middelen]  
SPIRITUEEL: [max 2 middelen]

Daarna een COMBINATIEVOORSTEL in dit formaat:
COMBO: [naam1] + [naam2] + [naam3]
UITLEG: [waarom samen, max 2 zinnen]
VOORZORG: [of: geen bijzondere voorzorgen]

Sluit af met één korte vervolgvraag.

Apotheek:\n${lijst}`;
  conversatieHistorie.push({role:"user", content: nieuwBericht});

  try{
    const resp=await fetch("/api/proxy",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01"},
      body:JSON.stringify({model:"claude-sonnet-4-5",max_tokens:1000,
        system:`Je bent de persoonlijke kruidentassistent van Elin's Kruiderij — warm, wijs en praktisch. Je geeft altijd een antwoord in drie lagen:

FYSIEK: welke middelen helpen lichamelijk, met dosering
EMOTIONEEL/MENTAAL: welke middelen ondersteunen de geest en emoties
SPIRITUEEL: welke middelen werken op energetisch of spiritueel niveau

Gebruik ALLEEN middelen uit de apotheek van Wilma. Noem altijd de exacte naam. Wees concreet maar warm van toon. Antwoord in het Nederlands.

Sluit af met één gerichte vervolgvraag aan Wilma om het advies nog persoonlijker te maken — kort en direct.`,
        messages:conversatieHistorie})});
    const data=await resp.json();
    const text=data.content?.find(b=>b.type==="text")?.text||(data.error?("API fout: "+data.error.message):"Geen antwoord ontvangen. Raw: "+JSON.stringify(data).slice(0,200));
    aiGesprek.push({role:"user",content:nieuwBericht});
    aiGesprek.push({role:"assistant",content:text});
    sessielog.push({
      tijd: new Date().toLocaleTimeString("nl-NL",{hour:"2-digit",minute:"2-digit"}),
      datum: new Date().toLocaleDateString("nl-NL"),
      vraag: aiQuery,
      antwoord: text
    });
    const m=text.match(/COMBO:([\s\S]*?)UITLEG:([\s\S]*?)VOORZORG:([\s\S]*)$/m);
    if(m){
      aiResponse=text.substring(0,text.indexOf("COMBO:")).trim();
      comboResponse={middelen:m[1].trim().split("+").map(s=>s.trim()),uitleg:m[2].trim(),voorzorg:m[3].trim()};
    } else {
      aiResponse=text;comboResponse=null;
    }
  } catch(err){aiResponse="Fout: " + err.message + " | proxy: /api/proxy | key: " + (apiKey ? apiKey.slice(0,8)+"..." : "LEEG");}

  if(btn){btn.textContent="Raadpleeg de kruidentassistent";btn.disabled=false;}
  renderAIResult();
  const akn=document.getElementById("actie-knoppen");
  if(akn)akn.style.display="flex";
}

function renderAIResult(){
  const box=document.getElementById("ai-response");
  if(box){box.style.display="block";box.querySelector(".ai-text").textContent=aiResponse||"";}
  const cb=document.getElementById("combo-box");
  if(!cb)return;
  if(comboResponse){
    const chips=comboResponse.middelen.map(naam=>{
      const r=remedies.find(x=>x.name.toLowerCase()===naam.toLowerCase());
      const off=r&&!r.active;
      return`<span class="combo-chip${off?" off":""}">${naam}${off?" (geen voorraad)":""}</span>`;
    }).join("");
    const heeftVoorzorg=comboResponse.voorzorg&&comboResponse.voorzorg.toLowerCase()!=="geen bijzondere voorzorgen";
    cb.style.display="block";
    cb.innerHTML=`<div class="combo-title">🌿 Combinatievoorstel</div>
      <div class="combo-middelen">${chips}</div>
      <div class="combo-uitleg">${comboResponse.uitleg}</div>
      ${heeftVoorzorg?`<div class="combo-voorzorg">⚠ ${comboResponse.voorzorg}</div>`:""}
      <div style="margin-top:12px">
        <button class="btn btn-secondary" onclick="maakComboEtiket()" style="font-size:12px;padding:7px 14px">🏷 Etiket voor dit combinatiemiddel</button>
      </div>`;
    cb.style.display="none";
  }
}

  const c=document.getElementById("content");

}

  renderSymptomResults();
}
function renderSymptomResults(){
  const box=document.getElementById("symptom-results");if(!box)return;
  if(!selectedSymptoms.length){box.innerHTML="";return;}
  const found=remedies.filter(r=>selectedSymptoms.some(s=>r.symptoms.some(rs=>rs.toLowerCase().includes(s))||r.spiritual.some(rs=>rs.toLowerCase().includes(s))));
  box.innerHTML=found.length?`<div style="margin-top:12px"><div class="section-title">Gevonden middelen</div>${found.map(r=>cardHtml(r)).join("")}</div>`:"";
}

let browseSearch="";
function renderBrowse(c){
  const cats=["alle","actief","uitgeschakeld","fysiek","spiritueel","tincture","olie","supplement","overig"];

  if(filterCategory==="actief")filtered=remedies.filter(r=>r.active);
  else if(filterCategory==="uitgeschakeld")filtered=remedies.filter(r=>!r.active);
  else if(filterCategory!=="alle")filtered=remedies.filter(r=>r.category===filterCategory||r.type===filterCategory);
  if(browseSearch.trim()){
    const q=browseSearch.toLowerCase();
    filtered=filtered.filter(r=>r.name.toLowerCase().includes(q)||r.symptoms.some(s=>s.toLowerCase().includes(q))||r.spiritual.some(s=>s.toLowerCase().includes(q)));
  }

// COMBO ETIKET
function maakComboEtiket(){
  if(!comboResponse)return;
  const naam=prompt("Geef de combinatie een naam:","Combinatiemiddel");
  if(!naam)return;

  // Verzamel info van de middelen in de combo
  const middelenData=comboResponse.middelen.map(n=>{
    const r=remedies.find(x=>x.name.toLowerCase()===n.toLowerCase());
    return r||{name:n,ingredients:n,dosage:"",caution:""};
  });
  const alleIngred=middelenData.map(r=>r.ingredients||r.name).filter(Boolean).join(" · ");
  const alleCautions=middelenData.map(r=>r.caution).filter(Boolean).join(" ");

  // Maak een tijdelijk remedy-object voor maakEtiket
  const comboRemedy={
    name:naam,
    type:"overig",
    ingredients:alleIngred,
    description:comboResponse.uitleg,
    dosage:middelenData.map(r=>r.dosage).filter(Boolean).join(" / ")||"Zie aparte middelen",
    caution:alleCautions||comboResponse.voorzorg||"",
    symptoms:[],spiritual:[]
  };
  const prev=selectedRemedy;
  selectedRemedy=comboRemedy;
  maakEtiket();
  selectedRemedy=prev;
}

          <div class="rij-label">Dosering</div>
          <div class="rij-waarde">${dosageKort}</div>
        </div>
        ${r.caution?`<div class="rij">
          <div class="rij-label">⚠ Let op</div>
          <div class="rij-waarde" style="color:#e8a87a">${cautionKort}</div>
        </div>`:""}
      </div>
      <div class="achter-footer">Handgemaakt met zorg · Elin's Kruiderij · ${jaar}</div>
    </div>
  </div>

  </body></html>`;

  const win=window.open("","_blank","width=420,height=700");
  if(win){win.document.write(html);win.document.close();}
  else{alert("Sta pop-ups toe voor deze pagina om het etiket te openen.");}
}

function wijzigApiKey(){
  const huidig=getApiKey();
  const k=prompt("API key invoeren of wijzigen:"+(huidig?"\n(huidig: ..."+huidig.slice(-6)+")":""));
  if(k===null)return;
  if(k.startsWith('sk-')){saveApiKey(k);alert("Key opgeslagen ✓");}
  else if(k===""){localStorage.removeItem('elins_api_key');alert("Key verwijderd.");}
  else{alert("Ongeldige key — moet beginnen met sk-");}
}

// SESSIE FUNCTIES
function resetScherm(){
  aiResponse=null;comboResponse=null;aiGesprek=[];aiQuery="";
  const el=document.getElementById("ai-input");if(el)el.value="";
  const box=document.getElementById("ai-response");if(box)box.style.display="none";
  const cb=document.getElementById("combo-box");if(cb)cb.style.display="none";
  const akn=document.getElementById("actie-knoppen");if(akn)akn.style.display="none";
}
function slaOp(){
  try{localStorage.setItem("elins_log",JSON.stringify(sessielog));}catch{}
  resetScherm();
}
function gooiWeg(){
  // Verwijder laatste item uit sessielog (was nog niet bewust opgeslagen)
  if(sessielog.length>0)sessielog.pop();
  resetScherm();
}

// LOG VIEW
let logZoek="";
function renderLog(c){
  const gefilterd=sessielog.filter(item=>
    !logZoek||
    item.vraag.toLowerCase().includes(logZoek.toLowerCase())||
    item.antwoord.toLowerCase().includes(logZoek.toLowerCase())
  ).reverse();

  c.innerHTML=`
    <div style="font-family:'IM Fell English',serif;font-size:22px;color:#d4b483;margin-bottom:12px">Sessiegeschiedenis</div>
    <input placeholder="🔍 Zoek op trefwoord..." value="${escHtml(logZoek)}"
      oninput="logZoek=this.value;renderLog(document.getElementById('content'))"
      style="width:100%;background:rgba(255,255,255,0.05);border:1px solid #3a2e1a;border-radius:8px;color:var(--text);padding:10px 12px;font-size:14px;font-family:'Crimson Pro',serif;outline:none;margin-bottom:14px">
    ${sessielog.length===0
      ? `<p style="color:var(--text-dim);font-size:14px">Nog geen vragen gesteld in deze sessie.</p>`
      : gefilterd.length===0
        ? `<p style="color:var(--text-dim);font-size:14px">Niets gevonden.</p>`
        : gefilterd.map((item,i)=>`
          <div class="card" onclick="toonLogItem(${sessielog.indexOf(item)})">
            <div style="font-size:10px;letter-spacing:2px;color:var(--gold-dim);text-transform:uppercase;margin-bottom:4px">${item.datum} · ${item.tijd}</div>
            <div style="font-size:16px;color:#d4b483;margin-bottom:4px">${escHtml(item.vraag.slice(0,80))}${item.vraag.length>80?"...":""}</div>
            <div style="font-size:12px;color:var(--text-dim)">${escHtml(item.antwoord.slice(0,100))}...</div>
          </div>`).join("")
    }`;
}

function toonLogItem(idx){
  const item=sessielog[idx];
  if(!item)return;
  const win=window.open("","_blank","width=480,height=700");
  if(!win)return;
  win.document.write(`<!DOCTYPE html><html lang="nl"><head><meta charset="UTF-8">
    <title>Advies ${item.datum}</title>
    <style>
      body{font-family:Georgia,serif;background:#1e3a2e;color:#e8d9b5;padding:24px;max-width:480px;margin:0 auto}
      h2{color:#c9a96e;font-size:20px;margin-bottom:4px}
      .meta{font-size:11px;color:#6b5a3a;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px}
      .vraag{background:rgba(180,130,60,0.1);border-left:3px solid #c9a96e;padding:10px 14px;border-radius:4px;margin-bottom:16px;font-style:italic}
      .antwoord{font-size:14px;line-height:1.9;white-space:pre-wrap}
      .btn{display:block;margin:20px auto 0;padding:10px 24px;background:linear-gradient(135deg,#8B6914,#c9a96e);color:#1e3a2e;border:none;border-radius:8px;font-size:13px;cursor:pointer;letter-spacing:1px;text-transform:uppercase;font-family:Georgia,serif;font-weight:bold}
      @media print{.btn{display:none}}
    </style></head><body>
    <h2>Elin's Kruiderij — Advies</h2>
    <div class="meta">${item.datum} · ${item.tijd}</div>
    <div class="vraag">${escHtml(item.vraag)}</div>
    <div class="antwoord">${escHtml(item.antwoord)}</div>
    <button class="btn" onclick="window.print()">Afdrukken</button>
    </body></html>`);
  win.document.close();
}

// HELPERS
function cardHtml(r){
  const color=typeColors[r.type]||"#8B7355";
  return`<div class="card${r.active?"":" inactive"}" onclick="showView('detail',${JSON.stringify(r).replace(/"/g,"&quot;")})">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
      <div class="card-name" style="color:${r.active?"#d4b483":"#6b5a3a"}">${r.name}</div>
      <label class="toggle" onclick="event.stopPropagation()">
        <input type="checkbox" ${r.active?"checked":""} onchange="toggleActive(${r.id},event)">
        <span class="toggle-slider"></span>
      </label>
    </div>
    <div style="margin:5px 0">
      <span class="badge" style="background:${color}33;color:${color};border:1px solid ${color}44">${typeLabels[r.type]||r.type}</span>
      ${r.selfMade?'<span class="badge badge-self">eigengemaakt</span>':""}
      ${!r.active?'<span class="badge badge-off">geen voorraad</span>':""}
    </div>
    <div class="card-snippet">${r.description.slice(0,90)}${r.description.length>90?"...":""}</div>
  </div>`;
}
function escHtml(s){return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

const _orig=showView;
window.showView=function(view,d){
  if(typeof d==="string"){try{d=JSON.parse(d.replace(/&quot;/g,'"'));}catch{}}
  _orig(view,d);
};

loadData();render();setStatus("☁ gereed","ok");

  // Automatisch opslaan bij afsluiten als er een open antwoord is
  if(aiResponse){
    try{localStorage.setItem("elins_log",JSON.stringify(sessielog));}catch{}
  }
});
</script>
