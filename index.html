<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elins Kruiderij</title>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d2318;--bg2:#1e3a2e;--gold:#c9a96e;--gold2:#8B6914;
    --gold-dim:#6b5a3a;--text:#e8d9b5;--text-dim:#9a8a6a;
    --purple:#9a7ab0;--green:#7aaa5a;--red:#e87a7a;
    --card:rgba(255,255,255,0.04);--border:rgba(180,130,60,0.15);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',Georgia,serif;min-height:100vh;max-width:480px;margin:0 auto;position:relative}
  body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");opacity:0.5}

  #header{padding:20px 20px 0;position:relative;z-index:1}
  .header-top{display:flex;align-items:flex-start;justify-content:space-between}
  .app-label{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--gold-dim);margin-bottom:2px}
  .app-title{font-family:'IM Fell English',serif;font-size:28px;color:var(--gold);text-shadow:0 0 30px rgba(180,130,60,0.3);line-height:1.1}
  #cloud-status{font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:8px;margin-top:6px;white-space:nowrap;background:rgba(80,140,80,0.15);color:var(--green);border:1px solid rgba(122,170,90,0.3)}

  #nav{display:flex;gap:6px;padding:14px 20px 0;position:relative;z-index:1;flex-wrap:wrap}
  .nav-btn{padding:6px 13px;border-radius:20px;font-size:11px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:1px solid #3a2e1a;background:rgba(255,255,255,0.03);color:var(--gold-dim);font-family:'Crimson Pro',serif;transition:all 0.2s}
  .nav-btn.active{border-color:var(--gold);background:rgba(180,130,60,0.18);color:var(--gold)}

  #content{padding:20px;position:relative;z-index:1}

  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;cursor:pointer;transition:all 0.2s}
  .card:hover{background:rgba(255,255,255,0.07);border-color:rgba(180,130,60,0.3)}
  .card.inactive{opacity:0.45;filter:grayscale(0.5)}
  .card-name{font-size:18px;color:#d4b483;margin-bottom:5px;font-family:'IM Fell English',serif}
  .card-snippet{font-size:13px;color:var(--text-dim);margin-top:6px;line-height:1.5}

  /* Toggle */
  .toggle{position:relative;width:38px;height:20px;flex-shrink:0;display:inline-block}
  .toggle input{opacity:0;width:0;height:0}
  .toggle-slider{position:absolute;inset:0;background:#2a1e0a;border-radius:20px;cursor:pointer;transition:0.3s;border:1px solid #3a2e1a}
  .toggle-slider:before{content:'';position:absolute;height:14px;width:14px;left:2px;top:2px;background:#6b5a3a;border-radius:50%;transition:0.3s}
  .toggle input:checked+.toggle-slider{background:rgba(180,130,60,0.25);border-color:var(--gold)}
  .toggle input:checked+.toggle-slider:before{transform:translateX(18px);background:var(--gold)}
  .toggle-row{display:flex;align-items:center;gap:8px;margin-top:10px}
  .toggle-lbl{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--gold-dim)}
  .toggle-lbl.on{color:var(--green)}

  .badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;letter-spacing:1px;text-transform:uppercase;margin-right:5px}
  .badge-self{background:rgba(85,107,63,0.2);color:#7aaa5a;border:1px solid rgba(85,107,63,0.3)}
  .badge-off{background:rgba(80,60,40,0.3);color:#6b5a3a;border:1px solid #3a2e1a}

  .section-title{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold-dim);margin-bottom:10px;border-bottom:1px solid #2a1e0a;padding-bottom:6px}

  .tag{display:inline-block;margin:3px;padding:5px 10px;border-radius:14px;font-size:12px;cursor:pointer;transition:all 0.15s;background:rgba(255,255,255,0.04);border:1px solid #2a1e0a;color:#7a6a4a}
  .tag.active{background:rgba(180,130,60,0.25);border-color:var(--gold);color:var(--gold)}
  .tag.spiritual{border-color:#3a2a4a;color:var(--purple)}
  .tag.no-click{cursor:default}

  input,textarea,select{width:100%;background:rgba(255,255,255,0.05);border:1px solid #3a2e1a;border-radius:8px;color:var(--text);padding:10px 12px;font-size:14px;font-family:'Crimson Pro',serif;outline:none;resize:vertical}
  select{cursor:pointer}
  .form-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#8B7355;margin-bottom:4px;display:block}
  .form-row{margin-bottom:14px}
  .input-wrap{position:relative}
  .mic-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:rgba(180,130,60,0.15);border:1px solid rgba(180,130,60,0.3);border-radius:50%;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all 0.2s}
  .mic-btn.listening{background:rgba(220,80,80,0.25);border-color:var(--red);animation:pulse 1s infinite}
  .mic-label{font-size:10px;color:var(--red);letter-spacing:1px;text-transform:uppercase;margin-top:4px}
  textarea.with-mic{padding-right:44px;min-height:80px}
  input.with-mic{padding-right:44px}
  .textarea-wrap{position:relative}
  .textarea-wrap .mic-btn{top:10px;transform:none}

  .btn{padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-size:13px;letter-spacing:1px;text-transform:uppercase;font-family:'Crimson Pro',serif;transition:all 0.2s}
  .btn-primary{background:linear-gradient(135deg,var(--gold2),var(--gold));color:var(--bg);font-weight:600}
  .btn-secondary{background:rgba(255,255,255,0.06);color:var(--gold);border:1px solid #3a2e1a}
  .btn-danger{background:rgba(139,50,50,0.3);color:var(--red)}
  .btn-full{width:100%;margin-top:8px}
  .btn-row{display:flex;gap:8px;margin-top:16px}

  .back-btn{background:none;border:none;color:#8B7355;cursor:pointer;font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:0 0 16px;display:flex;align-items:center;gap:6px;font-family:'Crimson Pro',serif}

  .ai-box{background:rgba(90,60,20,0.15);border:1px solid rgba(180,130,60,0.2);border-radius:12px;padding:16px;margin-top:16px}
  .ai-text{font-size:14px;line-height:1.9;color:#d4b483;white-space:pre-wrap}

  .combo-box{background:rgba(60,40,90,0.2);border:1px solid rgba(154,122,176,0.3);border-radius:12px;padding:16px;margin-top:12px}
  .combo-title{font-family:'IM Fell English',serif;font-size:18px;color:var(--purple);margin-bottom:10px}
  .combo-middelen{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0 12px}
  .combo-chip{padding:6px 14px;border-radius:10px;font-size:13px;background:rgba(154,122,176,0.15);border:1px solid rgba(154,122,176,0.35);color:var(--purple)}
  .combo-chip.off{background:rgba(80,60,60,0.15);border-color:#3a2e1a;color:#6b5a3a;text-decoration:line-through}
  .combo-uitleg{font-size:14px;color:var(--text-dim);line-height:1.8}
  .combo-voorzorg{font-size:12px;color:#e8a87a;margin-top:10px;padding-top:10px;border-top:1px solid rgba(180,130,60,0.12)}

  .detail-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold-dim);margin-bottom:4px}
  .detail-value{font-size:15px;color:var(--gold);line-height:1.6}
  .detail-section{margin-bottom:18px}
  .detail-notes{background:rgba(180,130,60,0.07);border-radius:8px;padding:10px 12px;font-style:italic}
  .detail-caution{color:#e8a87a}

  .home-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
  .home-tile{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px 10px;cursor:pointer;text-align:center;transition:all 0.2s;font-family:'Crimson Pro',serif}
  .home-tile:hover{background:rgba(255,255,255,0.07)}
  .home-tile-icon{font-size:26px;margin-bottom:6px}
  .home-tile-label{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#8B7355}

  .voorraad-row{display:flex;gap:14px;justify-content:center;margin-top:8px;font-size:12px;color:var(--text-dim)}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
  .dot-on{background:var(--green)}
  .dot-off{background:#3a2e1a}
  .save-msg{color:var(--green);font-size:13px;margin-top:8px}

  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes bubblein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.chat-wrap{display:flex;flex-direction:column;gap:12px;padding:12px 0;min-height:200px}
.bubble-row{display:flex;animation:bubblein 0.3s ease}
.bubble-row.gebruiker{justify-content:flex-end}
.bubble-row.assistent{justify-content:flex-start}
.bubble{max-width:82%;padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.7}
.bubble.gebruiker{background:rgba(180,130,60,0.2);border:1px solid rgba(180,130,60,0.3);color:#e8d9b5;border-bottom-right-radius:4px}
.bubble.assistent{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#d4b483;border-bottom-left-radius:4px}
.chat-input-wrap{display:flex;gap:8px;align-items:flex-end;margin-top:12px;border-top:1px solid #2a1e0a;padding-top:12px}
.chat-input{flex:1;background:rgba(255,255,255,0.05);border:1px solid #3a2e1a;border-radius:12px;color:var(--text);padding:10px 14px;font-size:14px;font-family:'Crimson Pro',serif;outline:none;resize:none;min-height:44px;max-height:120px}
.chat-send{background:linear-gradient(135deg,#8B6914,#c9a96e);border:none;border-radius:10px;color:#1e3a2e;padding:10px 16px;cursor:pointer;font-size:18px;flex-shrink:0}
.chat-send:disabled{opacity:0.4;cursor:not-allowed}
.samenvatting-box{background:rgba(60,40,90,0.2);border:1px solid rgba(154,122,176,0.3);border-radius:12px;padding:14px;margin-top:8px}
.typing{display:flex;gap:4px;padding:4px 0}
.typing span{width:7px;height:7px;background:#c9a96e;border-radius:50%;animation:typing 1.2s infinite}
.typing span:nth-child(2){animation-delay:0.2s}
.typing span:nth-child(3){animation-delay:0.4s}
@keyframes typing{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
  @keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes bubblein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.bubble-row{display:flex;animation:bubblein 0.3s ease}
.bubble-row.gebruiker{justify-content:flex-end}
.bubble-row.assistent{justify-content:flex-start}
.bubble{max-width:82%;padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.7}
.bubble.gebruiker{background:rgba(180,130,60,0.2);border:1px solid rgba(180,130,60,0.3);color:#e8d9b5;border-bottom-right-radius:4px}
.bubble.assistent{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#d4b483;border-bottom-left-radius:4px}
.chat-input{flex:1;background:rgba(255,255,255,0.05);border:1px solid #3a2e1a;border-radius:12px;color:var(--text);padding:10px 14px;font-size:14px;font-family:'Crimson Pro',serif;outline:none;resize:none;min-height:44px;max-height:120px}
.chat-send{background:linear-gradient(135deg,#8B6914,#c9a96e);border:none;border-radius:10px;color:#1e3a2e;padding:10px 16px;cursor:pointer;font-size:18px;flex-shrink:0}
.chat-send:disabled{opacity:0.4;cursor:not-allowed}
.typing{display:flex;gap:4px;padding:4px 0}
.typing span{width:7px;height:7px;background:#c9a96e;border-radius:50%;animation:blink 1.2s infinite}
.typing span:nth-child(2){animation-delay:0.2s}
.typing span:nth-child(3){animation-delay:0.4s}
@keyframes blink{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
  .fadein{animation:fadein 0.3s ease}
</style>
</head>
<body>
<div id="header">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px 0">
    <div>
      <div style="font-family:'IM Fell English',serif;font-size:28px;color:#c9a96e;text-shadow:0 0 30px rgba(180,130,60,0.3);line-height:1.1">Elin's Kruiderij</div>
    </div>
    <div id="cloud-status">☁ gereed</div>
  </div>
</div>
<div id="nav">
  <button class="nav-btn active" onclick="showView('home')">Home</button>
  <button class="nav-btn" onclick="showView('search')">Raadplegen</button>
  <button class="nav-btn" onclick="showView('browse')">Bladeren</button>
  <button class="nav-btn" onclick="showView('logview')">📋 Log</button>
  <button class="nav-btn" onclick="wijzigApiKey()" style="margin-left:auto">⚙</button>
</div>
<div id="content"></div>

<script>
const STORAGE_KEY="elins_kruiderij_v2";
const initialRemedies=[]
const typeLabels={kruid:"Kruid",tinctuur:"Tinctuur",olie:"Olie / Zalf",zalf:"Zalf",supplement:"Supplement",spiritueel:"Spiritueel",overig:"Overig"};
const typeColors={kruid:"#5a7a3a",tinctuur:"#8B4513",olie:"#556B2F",zalf:"#4a6b6b",supplement:"#4A6741",spiritueel:"#5B3A6B",overig:"#7A6040"};
const commonSymptoms=["slaapproblemen","onrust","angst","vermoeidheid","pijn","hoofdpijn","maagklachten","darmklachten","infectie","verkoudheid","griep","depressie","concentratie","geheugen","immuunsysteem","huid","gewrichten","spieren","hormonen","cyclus","dromen","intuïtie"];

let remedies=[],currentView="home",selectedRemedy=null,editForm=null;
const IS_ADMIN=new URLSearchParams(window.location.search).get('admin')==='true';
let selectedSymptoms=[],directSearch="",filterCategory="alle";
let aiQuery="",aiResponse=null,comboResponse=null,aiGesprek=[],sessielog=[],chatBerichten=[],chatFilter={vormen:[],categorieen:[]};
let aiListening=false,directListening=false,aiRec=null,directRec=null;

function getApiKey(){return localStorage.getItem('elins_api_key')||'';}
function saveApiKey(k){localStorage.setItem('elins_api_key',k.trim());}

function slaEigenNotitieOp(id, tekst){
  try{
    const key='kruiden_notitie_'+id;
    localStorage.setItem(key, tekst);
    const r=remedies.find(x=>x.id===id);
    if(r)r._eigenNotitie=tekst;
  }catch(e){}
}
function laadEigenNotities(){
  remedies.forEach(r=>{
    try{
      const n=localStorage.getItem('kruiden_notitie_'+r.id);
      if(n)r._eigenNotitie=n;
    }catch{}
  });
}
async function fetchKruiden(){
  try{
    const r=await fetch('/kruiderij-data.json?t='+Date.now());
    if(r.ok){const d=await r.json();initialRemedies.splice(0,initialRemedies.length,...d);}
  }catch(e){console.warn('Kruiden JSON niet geladen:',e);}
}
function loadData(){
  try{const log=localStorage.getItem("elins_log");if(log)sessielog=JSON.parse(log);}catch{}
  try{
    const opgeslagen=sessionStorage.getItem("elins_chat");
    if(opgeslagen){
      const d=JSON.parse(opgeslagen);
      chatBerichten=d.berichten||[];
      aiGesprek=d.gesprek||[];
      chatFilter=d.filter||{vormen:[],categorieen:[]};
      aiResponse=d.aiResponse||null;
    }
  }catch{}
  try{const s=localStorage.getItem(STORAGE_KEY);remedies=s?JSON.parse(s):[...initialRemedies];}
  catch{remedies=[...initialRemedies];}
  // Migratie: oude "tincture" naar "tinctuur"
  remedies=remedies.map(r=>({active:true,...r,type:r.type==="tincture"?"tinctuur":r.type}));
}
function saveData(){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(remedies));setStatus("☁ opgeslagen","ok");}
  catch{setStatus("⚠ fout","fout");}
}
function setStatus(txt,type){
  const el=document.getElementById("cloud-status");if(!el)return;
  el.textContent=txt;
  el.style.background=type==="ok"?"rgba(80,140,80,0.15)":"rgba(180,60,60,0.15)";
  el.style.color=type==="ok"?"#7aaa5a":"#e87a7a";
  el.style.border=`1px solid ${type==="ok"?"rgba(122,170,90,0.3)":"rgba(232,122,122,0.3)"}`;
}

function toggleActive(id,ev){
  ev&&ev.stopPropagation();
  remedies=remedies.map(r=>r.id===id?{...r,active:!r.active}:r);
  if(selectedRemedy&&selectedRemedy.id===id)selectedRemedy=remedies.find(r=>r.id===id);
  saveData();render();
}

// SPRAAK
function makeSpeechRec(onResult,onEnd){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return null;
  const rec=new SR();rec.lang="nl-NL";rec.continuous=true;rec.interimResults=true;
  let final="";
  rec.onstart=()=>{final="";};rec.onend=onEnd;rec.onerror=onEnd;
  rec.onresult=(e)=>{
    let interim="";
    for(let i=e.resultIndex;i<e.results.length;i++){
      const t=e.results[i][0].transcript;
      if(e.results[i].isFinal)final+=t+" ";else interim=t;
    }
    onResult(final+interim);
  };
  return rec;
}
function toggleAiMic(){
  if(aiListening){aiRec&&aiRec.stop();aiListening=false;}
  else{
    aiRec=makeSpeechRec(
      t=>{aiQuery=t;const el=document.getElementById("ai-input");if(el)el.value=t;},
      ()=>{aiListening=false;updateMic("ai-mic","ai-mic-label",false);}
    );
    if(aiRec){aiRec.start();aiListening=true;}
  }
  updateMic("ai-mic","ai-mic-label",aiListening);
}
function toggleDirectMic(){
  if(directListening){directRec&&directRec.stop();directListening=false;}
  else{
    directRec=makeSpeechRec(
      t=>{directSearch=t;const el=document.getElementById("direct-input");if(el)el.value=t;renderDirectResults();},
      ()=>{directListening=false;updateMic("direct-mic","direct-mic-label",false);}
    );
    if(directRec){directRec.start();directListening=true;}
  }
  updateMic("direct-mic","direct-mic-label",directListening);
}
function updateMic(bid,lid,on){
  const b=document.getElementById(bid);if(b){b.textContent=on?"⏹":"🎙";b.className="mic-btn"+(on?" listening":"");}
  const l=document.getElementById(lid);if(l)l.style.display=on?"block":"none";
}

// AI
async function askAI(){
  const inp=document.getElementById("ai-input");
  aiQuery=inp?inp.value:aiQuery;
  if(!aiQuery.trim())return;
  let apiKey=getApiKey();
  if(!apiKey){
    const k=prompt("Voer je Anthropic API key in (begint met sk-ant-):");
    if(!k||!k.startsWith('sk-')){alert("Geen geldige key ingevoerd.");return;}
    saveApiKey(k);
    apiKey=k;
  }
  aiResponse=null;comboResponse=null;
  const btn=document.getElementById("ask-btn");
  if(btn){btn.textContent="Zoeken...";btn.disabled=true;}

  const lijst=remedies.map(r=>`[${r.active?"BESCHIKBAAR":"UITGESCHAKELD"}] ${r.name} (${typeLabels[r.type]}): symptomen: ${r.symptoms.join(", ")}; spiritueel: ${r.spiritual.join(", ")}; ${r.description}`).join("\n");

  const conversatieHistorie = aiGesprek.map(m => ({role: m.role, content: m.content}));
  const nieuwBericht = `Vraag: "${aiQuery}"

Geef advies in drie lagen (gebruik alleen BESCHIKBARE middelen uit de apotheek):

FYSIEK: [max 2-3 middelen met dosering]
EMOTIONEEL/MENTAAL: [max 2 middelen]  
SPIRITUEEL: [max 2 middelen]

Daarna een COMBINATIEVOORSTEL in dit formaat:
COMBO: [naam1] + [naam2] + [naam3]
UITLEG: [waarom samen, max 2 zinnen]
VOORZORG: [of: geen bijzondere voorzorgen]

Sluit af met één korte vervolgvraag.

Apotheek:\n${lijst}`;
  conversatieHistorie.push({role:"user", content: nieuwBericht});

  try{
    const resp=await fetch("/api/proxy",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01"},
      body:JSON.stringify({model:"claude-sonnet-4-5",max_tokens:1000,
        system:`Je bent de persoonlijke kruiden assistent van Elin's Kruiderij — warm, wijs en praktisch. Je geeft altijd een antwoord in drie lagen:

FYSIEK: welke middelen helpen lichamelijk, met dosering
EMOTIONEEL/MENTAAL: welke middelen ondersteunen de geest en emoties
SPIRITUEEL: welke middelen werken op energetisch of spiritueel niveau

Gebruik ALLEEN middelen uit de apotheek van Wilma. Noem altijd de exacte naam. Wees concreet maar warm van toon. Antwoord in het Nederlands.

function stripOpmaak(tekst){
  let t=tekst;
  t=t.replace(/#{1,6} */g,"");
  t=t.replace(/\*\*([^*]+)\*\*/g,"$1");
  t=t.replace(/\*([^*]+)\*/g,"$1");
  t=t.replace(/^[-*] +/gm,"• ");
  t=t.replace(/^\d+\. +/gm,"");
  return t.trim();
}

async function stuurChatBericht(){
  const inp=document.getElementById("ai-input");
  const tekst=inp?inp.value.trim():"";
  if(!tekst)return;

  // Voeg gebruikersbericht toe
  chatBerichten.push({rol:"gebruiker",tekst});
  aiQuery=tekst;
  if(inp){inp.value="";inp.style.height="auto";}
  renderChatBerichten();

  // Toon laadanimatie
  const laden=document.getElementById("chat-laden");
  if(laden)laden.style.display="block";
  const btn=document.getElementById("ask-btn");
  if(btn)btn.disabled=true;

  const actief=remedies.filter(r=>r.active);
  const lijst=remedies.map(r=>`[${r.active?"BESCHIKBAAR":"UITGESCHAKELD"}] ${r.name} (${typeLabels[r.type]}): symptomen: ${r.symptoms.join(", ")}; spiritueel: ${r.spiritual.join(", ")}`).join("\n");

  aiGesprek.push({role:"user",content:tekst});

  try{
    const apiKey=getApiKey();
    if(!apiKey){
      const k=prompt("Voer je Anthropic API key in (begint met sk-):");
      if(!k||!k.startsWith('sk-')){if(laden)laden.style.display="none";if(btn)btn.disabled=false;return;}
      saveApiKey(k);
    }

    const resp=await fetch("/api/proxy",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01"},
      body:JSON.stringify({model:"claude-sonnet-4-5",max_tokens:1000,
        system:`Je bent de kruiden assistent van Elin's Kruiderij. Je voert een gewoon gesprek — warm, direct, geen opsommingstekens, geen sterretjes, geen hashtags. Gewone lopende tekst. Je geeft advies vanuit drie invalshoeken: lichamelijk, emotioneel en spiritueel, maar verweeft dat natuurlijk in je antwoord. Gebruik alleen middelen uit de apotheek. Noem de naam van het middel en zeg kort waarom. Sluit af met één gerichte vervolgvraag. Als het gesprek afgerond is en de gebruiker tevreden is, geef dan een korte samenvatting met alleen de aanbevolen middelen en dosering — begin die samenvatting met het woord SAMENVATTING:

Apotheek:
${lijst}`,
        messages:aiGesprek})});

    const data=await resp.json();
    const rauw=data.content?.find(b=>b.type==="text")?.text||(data.error?("Fout: "+data.error.message):"Geen antwoord ontvangen.");
    const schoon=stripOpmaak(rauw);

    aiGesprek.push({role:"assistant",content:rauw});
    aiResponse=rauw;

    // Check op samenvatting
    if(rauw.includes("SAMENVATTING:")){
      const delen=schoon.split("SAMENVATTING:");
      chatBerichten.push({rol:"assistent",tekst:delen[0].trim()});
      comboResponse={samenvatting:delen[1].trim()};
      chatBerichten.push({rol:"assistent",tekst:"Samenvatting:\n"+delen[1].trim()});
    } else {
      chatBerichten.push({rol:"assistent",tekst:schoon});
      comboResponse=null;
    }

    const akn=document.getElementById("actie-knoppen");
    if(akn)akn.style.display="flex";

  } catch(err){
    chatBerichten.push({rol:"assistent",tekst:"Fout: "+err.message});
  }

  if(laden)laden.style.display="none";
  if(btn)btn.disabled=false;
  renderChatBerichten();
}

function renderDirectResults(){
  const box=document.getElementById("direct-results");if(!box)return;
  if(!directSearch.trim()){box.innerHTML="";return;}
  const q=directSearch.toLowerCase();
  const found=remedies.filter(r=>r.name.toLowerCase().includes(q)||r.description.toLowerCase().includes(q)||r.symptoms.some(s=>s.toLowerCase().includes(q))||r.spiritual.some(s=>s.toLowerCase().includes(q)));
  box.innerHTML=found.length?found.map(r=>`<div style="margin-top:8px">${cardHtml(r)}</div>`).join(""):`<p style="color:var(--text-dim);font-size:13px;margin-top:8px">Niets gevonden.</p>`;
}
function toggleSymptom(s){
  if(selectedSymptoms.includes(s))selectedSymptoms=selectedSymptoms.filter(x=>x!==s);
  else selectedSymptoms.push(s);
  document.querySelectorAll("#symptom-tags .tag").forEach(el=>{el.className="tag"+(selectedSymptoms.includes(el.textContent)?" active":"");});
  renderSymptomResults();
}
function renderSymptomResults(){
  const box=document.getElementById("symptom-results");if(!box)return;
  if(!selectedSymptoms.length){box.innerHTML="";return;}
  const found=remedies.filter(r=>selectedSymptoms.some(s=>r.symptoms.some(rs=>rs.toLowerCase().includes(s))||r.spiritual.some(rs=>rs.toLowerCase().includes(s))));
  box.innerHTML=found.length?`<div style="margin-top:12px"><div class="section-title">Gevonden middelen</div>${found.map(r=>cardHtml(r)).join("")}</div>`:"";
}

async function werkHetUit(){
  if(aiGesprek.length===0){
    chatBerichten.push({rol:"assistent",tekst:"We hebben nog geen gesprek gevoerd. Stel eerst een vraag!"});
    renderChatBerichten();return;
  }
  const btn=document.getElementById("ask-btn");
  const laden=document.getElementById("chat-laden");
  if(btn)btn.disabled=true;
  if(laden)laden.style.display="block";
  const vormenTekst=chatFilter.vormen.length>0?"gewenste vorm: "+chatFilter.vormen.join(" of "):"";
  const catTekst=chatFilter.categorieen.length>0?"focus op: "+chatFilter.categorieen.join(" en "):"";
  const filterContext=[vormenTekst,catTekst].filter(Boolean).join(", ");
  const filterZin=filterContext?" Houd rekening met: "+filterContext+". Vermeld aan het einde kort welke andere vormen ook mogelijk zijn als korte tip.":"";
  aiGesprek.push({role:"user",content:"Werk het nu uit."+filterZin+" Geef een korte samenvatting van maximaal 3 zinnen, gevolgd door de concrete middelen met dosering. Geen opmaaktekens."});
  try{
    const apiKey=getApiKey();
    const resp=await fetch("/api/proxy",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01"},
      body:JSON.stringify({model:"claude-sonnet-4-5",max_tokens:600,
        system:"Je bent de kruiden assistent van Elins Kruiderij. Geef een heldere uitwerking zonder opmaaktekens, sterretjes of hashtags. Gewone lopende tekst.",
        messages:aiGesprek})});
    const data=await resp.json();
    const rauw=data.content?.find(b=>b.type==="text")?.text||"Kon niet uitwerken.";
    const schoon=stripOpmaak(rauw);
    chatBerichten.push({rol:"assistent",tekst:schoon});
    aiResponse=rauw;
    const logItem={
      tijd:new Date().toLocaleTimeString("nl-NL",{hour:"2-digit",minute:"2-digit"}),
      datum:new Date().toLocaleDateString("nl-NL"),
      vraag:chatBerichten.filter(b=>b.rol==="gebruiker").map(b=>b.tekst).join(" / "),
      antwoord:schoon,
      berichten:[...chatBerichten],
      gesprek:[...aiGesprek]
    };
    sessielog.push(logItem);
    try{localStorage.setItem("elins_log",JSON.stringify(sessielog));}catch{}
    const akn=document.getElementById("actie-knoppen");

  if(laden)laden.style.display="none";
  renderChatBerichten();
}

function wijzigApiKey(){
  const huidig=getApiKey();
  const k=prompt("API key invoeren of wijzigen:"+(huidig?"\n(huidig: ..."+huidig.slice(-6)+")":""));
  if(k===null)return;
  if(k.startsWith('sk-')){saveApiKey(k);alert("Key opgeslagen ✓");}
  else if(k===""){localStorage.removeItem('elins_api_key');alert("Key verwijderd.");}
  else{alert("Ongeldige key — moet beginnen met sk-");}
}

// SESSIE FUNCTIES
function resetScherm(bewaargesprek){
  aiResponse=null;comboResponse=null;aiQuery="";
  if(!bewaargesprek){
    aiGesprek=[];chatBerichten=[];
    try{sessionStorage.removeItem("elins_chat");}catch{}
  }
  const el=document.getElementById("ai-input");if(el){el.value="";el.style.height="auto";}
  const akn=document.getElementById("actie-knoppen");if(akn)akn.style.display="none";
  renderChatBerichten();
}
function slaOp(){
  try{localStorage.setItem("elins_log",JSON.stringify(sessielog));}catch{}
  resetScherm(true); // bewaar gesprek voor vervolgvraag
}
function gooiWeg(){
  if(sessielog.length>0)sessielog.pop();
  resetScherm(false); // wis gesprek
}

// LOG VIEW

function renderLog(c){
  const gefilterd=sessielog.filter(item=>
    !logZoek||
    item.vraag.toLowerCase().includes(logZoek.toLowerCase())||
    item.antwoord.toLowerCase().includes(logZoek.toLowerCase())
  ).reverse();

  c.innerHTML=`
    <div style="font-family:'IM Fell English',serif;font-size:22px;color:#d4b483;margin-bottom:12px">Sessiegeschiedenis</div>
    <input placeholder="🔍 Zoek op trefwoord..." value="${escHtml(logZoek)}"
      oninput="logZoek=this.value;renderLog(document.getElementById('content'))"
      style="width:100%;background:rgba(255,255,255,0.05);border:1px solid #3a2e1a;border-radius:8px;color:var(--text);padding:10px 12px;font-size:14px;font-family:'Crimson Pro',serif;outline:none;margin-bottom:14px">
    ${sessielog.length===0
      ? `<p style="color:var(--text-dim);font-size:14px">Nog geen vragen gesteld in deze sessie.</p>`
      : gefilterd.length===0
        ? `<p style="color:var(--text-dim);font-size:14px">Niets gevonden.</p>`
        : gefilterd.map((item)=>{const idx=sessielog.indexOf(item);return`
          <div class="card" style="position:relative">
            <div onclick="toonLogItem(${idx})" style="padding-right:32px">
              <div style="font-size:10px;letter-spacing:2px;color:var(--gold-dim);text-transform:uppercase;margin-bottom:4px">${item.datum} · ${item.tijd}</div>
              <div style="font-size:16px;color:#d4b483;margin-bottom:4px">${escHtml(item.vraag.slice(0,80))}${item.vraag.length>80?"...":""}</div>
              <div style="font-size:12px;color:var(--text-dim)">${escHtml(item.antwoord.slice(0,100))}...</div>
              <div style="display:flex;gap:8px;margin-top:10px">
                <button onclick="event.stopPropagation();toonLogItem(${idx})" style="flex:1;background:rgba(180,130,60,0.1);border:1px solid rgba(180,130,60,0.2);color:var(--gold);border-radius:6px;padding:6px;cursor:pointer;font-size:11px;letter-spacing:1px;text-transform:uppercase">📄 Lezen</button>
                ${item.berichten?`<button onclick="event.stopPropagation();hervatChat(${idx})" style="flex:1;background:rgba(80,140,80,0.15);border:1px solid rgba(122,170,90,0.3);color:#7aaa5a;border-radius:6px;padding:6px;cursor:pointer;font-size:11px;letter-spacing:1px;text-transform:uppercase">💬 Verder</button>`:""}
              </div>
            </div>
            <button onclick="event.stopPropagation();if(confirm('Dit gesprek verwijderen?')){sessielog.splice(${idx},1);try{localStorage.setItem('elins_log',JSON.stringify(sessielog));}catch{}renderLog(document.getElementById('content'));}"
              style="position:absolute;top:12px;right:12px;background:rgba(139,50,50,0.3);border:none;color:#e87a7a;border-radius:6px;padding:4px 8px;cursor:pointer;font-size:12px">✕</button>
          </div>`}).join("")
    }`;
}

function setChatFilter(key,val){
  const arr=key==="vorm"?chatFilter.vormen:chatFilter.categorieen;
  const idx=arr.indexOf(val);
  if(idx===-1)arr.push(val);
  else arr.splice(idx,1);
  if(currentView==="search")render();
}

async function werkHetUit(){
  if(aiGesprek.length===0){
    chatBerichten.push({rol:"assistent",tekst:"We hebben nog geen gesprek gevoerd. Stel eerst een vraag!"});
    renderChatBerichten();
    return;
  }
  const btn=document.getElementById("ask-btn");
  const laden=document.getElementById("chat-laden");
  if(btn)btn.disabled=true;
  if(laden)laden.style.display="block";

  const vormenTekst=chatFilter.vormen.length>0?"gewenste vorm: "+chatFilter.vormen.join(" of "):"";
  const catTekst=chatFilter.categorieen.length>0?"focus op: "+chatFilter.categorieen.join(" en "):"";
  const filterContext=[vormenTekst,catTekst].filter(Boolean).join(", ");
  const filterZin=filterContext?" Houd rekening met: "+filterContext+". Vermeld aan het einde kort welke andere vormen ook mogelijk zijn (bijv. ook als thee of zalf), maar alleen als korte tip onderaan, niet als hoofdadvies.":"  Vermeld aan het einde kort welke andere vormen ook mogelijk zijn als korte tip onderaan.";

  aiGesprek.push({role:"user",content:"Werk het nu uit."+filterZin+" Geef een korte samenvatting van maximaal 3 zinnen, gevolgd door de concrete middelen met dosering. Helemaal onderaan, gescheiden door een witregel, een korte zin over andere vormen die ook mogelijk zijn. Geen opmaaktekens."});

  try{
    const apiKey=getApiKey();
    const resp=await fetch("/api/proxy",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01"},
      body:JSON.stringify({model:"claude-sonnet-4-5",max_tokens:600,
        system:"Je bent de kruiden assistent van Elins Kruiderij. Geef een heldere uitwerking zonder opmaaktekens, sterretjes of hashtags. Gewone lopende tekst met een regel per middel.",
        messages:aiGesprek})});
    const data=await resp.json();
    const rauw=data.content?.find(b=>b.type==="text")?.text||"Kon niet uitwerken.";
    const schoon=stripOpmaak(rauw);

    chatBerichten.push({rol:"assistent",tekst:schoon});
    aiResponse=rauw;

    // Uitwerking opslaan in log en direct wegschrijven
    const logItem={
      tijd:new Date().toLocaleTimeString("nl-NL",{hour:"2-digit",minute:"2-digit"}),
      datum:new Date().toLocaleDateString("nl-NL"),
      vraag:chatBerichten.filter(b=>b.rol==="gebruiker").map(b=>b.tekst).join(" / "),
      antwoord:schoon,
      berichten:[...chatBerichten],
      gesprek:[...aiGesprek]
    };
    sessielog.push(logItem);
    try{localStorage.setItem("elins_log",JSON.stringify(sessielog));}catch{}
    aiResponse=rauw;

    const akn=document.getElementById("actie-knoppen");
    if(akn)akn.style.display="flex";
  } catch(err){
    chatBerichten.push({rol:"assistent",tekst:"Fout bij uitwerken: "+err.message});
  }

  if(btn)btn.disabled=false;
  if(laden)laden.style.display="none";
  renderChatBerichten();
}

function hervatChat(idx){
  const item=sessielog[idx];
  if(!item||!item.berichten)return;
  chatBerichten=[...item.berichten];
  aiGesprek=[...item.gesprek];
  aiResponse=item.antwoord||null;
  showView("search");
  setTimeout(()=>{
    renderChatBerichten();
    const akn=document.getElementById("actie-knoppen");
    if(akn)akn.style.display="flex";
  },100);
}

function cardHtml(r){
  const color=typeColors[r.type]||"#8B7355";
  return`<div class="card${r.active?"":" inactive"}" onclick="openRemedyById(${r.id})">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
      <div class="card-name" style="color:${r.active?"#d4b483":"#6b5a3a"}">${r.name}</div>
      <label class="toggle" onclick="event.stopPropagation()">
        <input type="checkbox" ${r.active?"checked":""} onchange="toggleActive(${r.id},event)">
        <span class="toggle-slider"></span>
      </label>
    </div>
    <div style="margin:5px 0">
      <span class="badge" style="background:${color}33;color:${color};border:1px solid ${color}44">${typeLabels[r.type]||r.type}</span>
      ${r.selfMade?'<span class="badge badge-self">eigengemaakt</span>':""}
      ${!r.active?'<span class="badge badge-off">geen voorraad</span>':""}
    </div>
    <div class="card-snippet">${r.description.slice(0,90)}${r.description.length>90?"...":""}</div>
  </div>`;
}
function escHtml(s){return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function doseringVoorType(dosage,type){
  if(!dosage)return"—";
  const regels=dosage.split(".");
  const typeSleutel={tinctuur:"tinctuur",olie:"uitwendig",zalf:"uitwendig",kruid:"thee",supplement:"capsule",overig:""};
  const zoek=typeSleutel[type]||"";
  if(zoek){const gevonden=regels.find(r=>r.toLowerCase().includes(zoek));if(gevonden)return gevonden.trim()+".";}
  return regels[0].trim()+".";
}

function openRemedyById(id){
  try{
    const r=remedies.find(x=>x.id===id);
    if(!r){alert("Kruid niet gevonden (id="+id+", totaal="+remedies.length+")");return;}
    selectedRemedy=r;
    currentView="detail";
    const c=document.getElementById("content");
    c.innerHTML="";
    renderDetail(c);
  }catch(e){
    alert("Fout: "+e.message);
  }
}

const _orig=showView;
window.showView=function(view,d){
  if(typeof d==="string"){try{d=JSON.parse(d.replace(/&quot;/g,'"'));}catch{}}
  _orig(view,d);
};

fetchKruiden().then(()=>{loadData();laadEigenNotities();render();setStatus("☁ gereed","ok");});

// Deep link: open direct een kruid via URL-parameter ?kruid=naam
(function(){
  const params=new URLSearchParams(window.location.search);
  const kruidParam=params.get("kruid");
  if(!kruidParam)return;
  const zoek=kruidParam.toLowerCase().trim();
  const gevonden=remedies.find(r=>r.name.toLowerCase()===zoek)||
                 remedies.find(r=>r.name.toLowerCase().includes(zoek));
  if(gevonden){
    selectedRemedy=gevonden;
    currentView="detail";
    const c=document.getElementById("content");
    if(c){c.innerHTML="";renderDetail(c);}
  }
})();

  // Automatisch opslaan bij afsluiten als er een open antwoord is
  if(aiResponse){
    try{localStorage.setItem("elins_log",JSON.stringify(sessielog));}catch{}
  }
});
